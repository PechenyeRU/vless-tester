# Local development stack. Production scheduling/storage live in Kubernetes (see deploy/).
services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: vless
      POSTGRES_PASSWORD: vless
      POSTGRES_DB: vless_tester
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vless -d vless_tester"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
