name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # The coordinator embeds web/build via go:embed; provide a placeholder so
      # the Go build/vet/test work without building the SPA (covered by the web job).
      - name: placeholder embed target
        run: touch web/build/.gitkeep

      - name: gofmt
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "${unformatted}" ]; then
            echo "These files are not gofmt-clean:"
            echo "${unformatted}"
            exit 1
          fi

      - name: build
        run: go build ./...

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: install
        working-directory: web
        run: npm ci

      - name: build
        working-directory: web
        run: npm run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: placeholder embed target
        run: touch web/build/.gitkeep

      - uses: golangci/golangci-lint-action@v9
        with:
          version: latest
